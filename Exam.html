<!DOCTYPE html>
<html>

<head>
    <title>TechFlow Solutions</title>
</head>

<body style="background-color: #f0f0f0; text-align: center; margin: 0; font-family:Times of New Roman;">
    <h1 style="background-color:black; color:white; padding: 15px; margin: 0;">TechFlow Solutions</h1>
    <br><br>
    <div style="background-color: white; display: inline-block; padding: 40px; border-radius: 10px; width: 350px;">
        <h2 style="margin-top: 0; text-align: center;">Create Account</h2>

        <form style="text-align: left;">
            <label for="email" style="font-size: 18px; font-weight: bold;">Email address:</label><br>
            <input type="email" name="email" id="email"
                style="width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 20px; border: 1px solid black; ">

            <label for="password" style="font-size: 18px; font-weight: bold;">Password:</label><br>
            <input type="password" name="password" id="password"
                style="width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 20px; border: 1px solid black; ">

            <label for="confirm_password" style="font-size: 18px; font-weight: bold;">Confirm Password:</label><br>
            <input type="password" name="confirm_password" id="confirm_password"
                style="width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 20px; border: 1px solid black;">
            <label for="gender" style="font-size: 18px; font-weight: bold;">Gender:</label><br>
            <select name="gender" id="gender"
                style="width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 25px; border: 1px solid; background-color: white;">
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <input type="submit" value="Register"
                style="background-color: Green; color: white; padding: 12px; width: 100%; border: none; font-size: 16px; cursor: pointer;">
        </form>
    </div>
    <br><br><br><br><br><br><br><br><br><br>
    <p style="background-color: black; color: white; padding: 15px; margin: 0;">&copy; 2026 Techflow solutions. All
        rights reserved</p>
    <br>
    <p style="background-color: blue; color: white; padding: 10px; margin: 0;">Current user: 1</p>

</body>

</html>
